<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الصيدلة الشامل</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #c0392b;
            --bg-color: #f4f7f6;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; color: #333; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary-color); font-size: 24px; margin-bottom: 5px; }
        .note { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        .progress-bar-container { width: 100%; background: #ddd; height: 12px; border-radius: 6px; margin-bottom: 25px; overflow: hidden; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #progress-bar { width: 0%; height: 100%; background: var(--accent-color); transition: width 0.4s; }
        .question { margin-bottom: 30px; padding: 20px; border: 1px solid #e1e8ed; border-radius: 10px; background: #fff; }
        .question p { font-weight: bold; font-size: 18px; margin-bottom: 15px; color: var(--primary-color); }
        .options label { display: flex; align-items: center; padding: 15px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-size: 16px; }
        .options label:hover { background: #f0f7ff; border-color: var(--accent-color); }
        input[type="radio"] { width: 22px; height: 22px; margin-left: 15px; cursor: pointer; flex-shrink: 0; }
        button { background: var(--accent-color); color: white; border: none; padding: 16px; border-radius: 8px; cursor: pointer; font-size: 18px; width: 100%; margin-top: 20px; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #2980b9; }
        .result { display: none; margin-top: 25px; padding: 25px; border-radius: 10px; text-align: center; font-size: 1.4em; font-weight: bold; background: #fff; border: 2px solid var(--primary-color); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .correct { background-color: #d4edda !important; border-color: #27ae60 !important; color: #155724 !important; font-weight: bold; }
        .wrong { background-color: #f8d7da !important; border-color: #c0392b !important; color: #721c24 !important; }
        .correct-answer-text { display: block; margin-top: 10px; font-size: 14px; color: var(--success-color); font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>اختبار الصيدلة النهائي</h1>
    <p class="note">يحتوي هذا الاختبار على 48 سؤالاً (الأسئلة رقم 20 و 22 غير متوفرة في الملف الأصلي المرفوع)</p>
    
    <div class="progress-bar-container"><div id="progress-bar"></div></div>
    
    <div id="quiz-form"></div>
    
    <button id="submit-btn" onclick="checkAnswers()">إنهاء الاختبار وإظهار النتيجة</button>
    <div id="result" class="result"></div>
    <button id="restart-btn" style="display:none; background: var(--success-color);" onclick="location.reload()">إعادة الاختبار</button>
</div>

<script>
    const questions = [
        { num: 1, q: "What is the primary definition of General Anesthetics?", o: ["Agents causing local loss of pain without loss of consciousness", "Agents that only provide skeletal muscle relaxation", "Irreversible inhibition of motor nerves and sensory perception", "Reversible CNS depression with loss of sensation, consciousness, and reflexes"], a: 3 },
        { num: 2, q: "According to the physical theory, how do general anesthetics disrupt nerve transmission?", o: ["By increasing glutamate release", "By blocking muscarinic receptors in the heart", "By decreasing the lipid solubility of the blood-brain barrier", "By forming clathrates with water that aggregate at synapses"], a: 3 },
        { num: 3, q: "Which stage of anesthesia is characterized by surgical anesthesia and skeletal muscle relaxation?", o: ["Stage I", "Stage II", "Stage III", "Stage IV"], a: 2 },
        { num: 4, q: "What is the relationship between the Minimum Alveolar Concentration (MAC) and anesthetic potency?", o: ["Direct relationship: Higher MAC means higher potency", "No relationship between the two", "MAC only measures toxicity, not potency", "Inverse relationship: Lower MAC means higher potency"], a: 3 },
        { num: 5, q: "Which anesthetic gas is commonly known as 'laughing gas' and used frequently in dentistry?", o: ["Nitrous oxide", "Ether", "Halothane", "Isoflurane"], a: 0 },
        { num: 6, q: "Halothane should be avoided in patients with which of the following conditions?", o: ["Asthma", "Hepatic diseases", "Renal failure", "Hypotension"], a: 1 },
        { num: 7, q: "Which intravenous anesthetic produces 'dissociative anesthesia'?", o: ["Thiopental", "Propofol", "Ketamine", "Midazolam"], a: 2 },
        { num: 8, q: "What is the primary reason for adding Carbidopa to L-Dopa in treating Parkinsonism?", o: ["To increase the metabolism of L-Dopa in the brain", "To inhibit peripheral dopa decarboxylase", "To act as a direct D2 receptor agonist", "To decrease the absorption of L-Dopa"], a: 1 },
        { num: 9, q: "In Alzheimer's disease, memantine acts by blocking which receptors?", o: ["NMDA (Glutamate) receptors", "GABA receptors", "Nicotinic receptors", "D2 receptors"], a: 0 },
        { num: 10, q: "Which drug is the first choice for treating Status Epilepticus (I.V.)?", o: ["Ethosuximide", "Phenytoin", "Diazepam", "Sodium Valproate"], a: 2 },
        { num: 11, q: "What is the common side effect of Phenytoin in children?", o: ["Gum hyperplasia", "Dry mouth", "Hypertension", "Weight loss"], a: 0 },
        { num: 12, q: "Which antiepileptic drug is considered the 'Drug of Choice' for Petit-mal (Absence) seizures?", o: ["Carbamazepine", "Phenobarbital", "Ethosuximide", "Pregabalin"], a: 2 },
        { num: 13, q: "Why should Benzodiazepines be preferred over Barbiturates as preanesthetic sedatives?", o: ["Benzodiazepines depend on GABA and have a ceiling effect", "Benzodiazepines are direct Chloride channel openers", "Benzodiazepines are liver microsomal enzyme inducers", "Benzodiazepines have a narrower therapeutic window"], a: 0 },
        { num: 14, q: "What is the mechanism of action of Local Anesthetics?", o: ["Blocking Sodium channels", "Blocking Potassium channels", "Stimulating Chloride influx", "Blocking Calcium channels"], a: 0 },
        { num: 15, q: "Why is Adrenaline often combined with local anesthetics?", o: ["To cause vasoconstriction, increasing duration and decreasing toxicity", "To act as a buffer for pH", "To increase systemic absorption", "To prevent allergic reactions to ester drugs"], a: 0 },
        { num: 16, q: "Which of the following describes 'Neuroleptic Malignant Syndrome' (NMS)?", o: ["Severe hyperpyrexia and muscle rigidity", "Severe hypotension and muscle weakness", "Excessive sleepiness and bradycardia", "Acute hallucinations and diarrhea"], a: 0 },
        { num: 17, q: "Which drug is a MAO-B inhibitor used in Parkinsonism to increase Dopamine levels?", o: ["Amantadine", "Entacapone", "Selegiline", "Bromocriptine"], a: 2 },
        { num: 18, q: "In depression, the 'Cheese Reaction' is a hypertensive crisis caused by the interaction of Tyramine with which class of drugs?", o: ["SSRIs", "TCAs", "MAO Inhibitors", "SNRIs"], a: 2 },
        { num: 19, q: "Which antidepressant is known for causing 'Atropine-like' side effects such as dry mouth and constipation?", o: ["Imipramine", "Fluoxetine", "Dapoxetine", "Maprotiline"], a: 0 },
        { num: 21, q: "Which of the following is a Short-Acting B2 Agonist (SABA) used for 'quick relief' in asthma?", o: ["Salbutamol", "Formoterol", "Salmeterol", "Tiotropium"], a: 0 },
        { num: 23, q: "Which Long-Acting Muscarinic Antagonist (LAMA) is suitable for once-daily dosing in COPD?", o: ["Ipratropium bromide", "Tiotropium bromide", "Atropine", "Salmeterol"], a: 1 },
        { num: 24, q: "What is the mechanism of action of Sucralfate in treating peptic ulcers?", o: ["It neutralizes stomach acid directly", "It forms a physical barrier over the ulcer base", "It inhibits the H+/K+ ATPase pump", "It blocks H2 receptors on parietal cells"], a: 1 },
        { num: 25, q: "Why is Misoprostol contraindicated during pregnancy?", o: ["It causes severe hypertension", "It inhibits fetal lung development", "It leads to fetal tooth discoloration", "It can cause uterine contractions and abortion"], a: 3 },
        { num: 26, q: "Which area of the brain is located 'outside' the blood-brain barrier and triggers vomiting when it detects toxins?", o: ["Vomiting center", "Basal ganglia", "Chemoreceptor trigger zone (CTZ)", "Limbic system"], a: 2 },
        { num: 27, q: "Which drug is used as an antidote for Benzodiazepine overdose?", o: ["Naloxone", "Atropine", "Flumazenil", "Dantrolene"], a: 2 },
        { num: 28, q: "A patient taking Phenobarbital for a long time might develop which bone-related condition?", o: ["Osteoarthritis", "Osteomalacia/Rickets", "Bone marrow aplasia", "Bone cancer"], a: 1 },
        { num: 29, q: "Which neurotransmitter's overstimulation is linked to the 'Glutamate theory' of Alzheimer's?", o: ["Acetylcholine", "Dopamine", "Serotonin", "Glutamate"], a: 3 },
        { num: 30, q: "What distinguishes Amide local anesthetics from Ester local anesthetics?", o: ["Amides are hydrolyzed by esterases in the blood", "Amides have a longer duration of action and are metabolized in the liver", "Esters are only used for spinal anesthesia", "Amides are more likely to cause allergic reactions"], a: 1 },
        { num: 31, q: "Which dopamine receptor is targeted in the 'Limbic system' to treat the positive signs of psychosis?", o: ["D1 receptor", "D4 receptor", "D2 receptor", "Alpha-1 receptor"], a: 2 },
        { num: 32, q: "In Parkinsonism, the 'Masked face' and 'Resting tremors' are primarily due to a deficiency in which neurotransmitter?", o: ["Acetylcholine", "GABA", "Dopamine", "Norepinephrine"], a: 2 },
        { num: 33, q: "Which drug is used for 'Nocturnal enuresis' (bedwetting) in children?", o: ["Fluoxetine", "Chlorpromazine", "Diazepam", "Imipramine"], a: 3 },
        { num: 34, q: "Which antidepressant class carries the highest risk of 'Serotonin Syndrome' if combined with MAOIs?", o: ["TCAs", "Benzodiazepines", "Barbiturates", "SSRIs"], a: 3 },
        { num: 35, q: "What is the specific side effect of 'Candidiasis' associated with Inhaled Corticosteroids?", o: ["Bacterial infection of the lungs", "Viral pneumonia", "Fungal infection in the mouth (thrush)", "Hoarseness of voice"], a: 2 },
        { num: 36, q: "Which medication blocks the 'Cysteinyl Leukotriene-1 receptor' for asthma prophylaxis?", o: ["Zileuton", "Theophylline", "Montelukast", "Cromolyn sodium"], a: 2 },
        { num: 37, q: "Which cytoprotective agent causes 'blackening of the teeth and tongue'?", o: ["Colloidal bismuth compounds", "Sucralfate", "Misoprostol", "Carbenoxolone"], a: 0 },
        { num: 38, q: "Which drug is used specifically for 'Trigeminal Neuralgia'?", o: ["Sodium Valproate", "Ethosuximide", "Phenobarbital", "Carbamazepine"], a: 3 },
        { num: 39, q: "What is the main side effect of Carbenoxolone due to its mineralocorticoid activity?", o: ["Severe weight loss", "Sodium and water retention with hypertension", "Hyperkalemia", "Hypotension"], a: 1 },
        { num: 40, q: "Which of the following describes 'Grand-mal' epilepsy?", o: ["Transient unconsciousness in children with eyelid fluttering", "Localized one limb jerking", "Brief muscle jerks of the face only", "Generalized tonic-clonic convulsions with coma"], a: 3 },
        { num: 41, q: "Which neurotransmitter is considered 'Inhibitory' in the brain to stop epilepsy?", o: ["Glutamate", "GABA", "Aspartate", "Acetylcholine"], a: 1 },
        { num: 42, q: "Which drug acts by inhibiting the reuptake of GABA?", o: ["Vigabatrin", "Tiagabine", "Valproate", "Phenytoin"], a: 1 },
        { num: 43, q: "What is 'Neuroleptic Anesthesia'?", o: ["A combination of Nitrous Oxide and Ether", "A mix of Droperidol (tranquilizer) and Fentanyl (opioid)", "General anesthesia using only Barbiturates", "Anesthesia achieved by spinal injection"], a: 1 },
        { num: 44, q: "Which sedative-hypnotic is a 'Melatonin receptor agonist'?", o: ["Zolpidem", "Ramelteon", "Buspirone", "Alprazolam"], a: 1 },
        { num: 45, q: "What is 'Basal Anesthesia'?", o: ["Deepest stage of surgical anesthesia", "Anesthesia used only for brain surgery", "Anesthesia applied only to the skin surface", "Light anesthesia where the person is unconscious but not ready for surgery"], a: 3 },
        { num: 46, q: "Which drug is used as a 'Mood stabilizer' in Bipolar Depression?", o: ["Chlorpromazine", "Theophylline", "Salbutamol", "Lithium"], a: 3 },
        { num: 47, q: "What is the primary action of 'Second Generation' (Atypical) Antipsychotics?", o: ["Blocking Serotonin (5HT) receptors", "Blocking D2 receptors exclusively", "Stimulating Acetylcholine release", "Opening Chloride channels"], a: 0 },
        { num: 48, q: "Which stage of sleep in the sleep cycle is associated with 'Rapid Eye Movement' and increased Acetylcholine?", o: ["Stage 1", "Stage 2", "Stage 3 & 4", "Stage 5 (REM)"], a: 3 },
        { num: 49, q: "Which drug is used as a 'prophylactic' anti-inflammatory agent and is safe for use in children and pregnant women with asthma?", o: ["Salmeterol", "Cromolyn sodium", "Theophylline", "Aminophylline"], a: 1 },
        { num: 50, q: "Which local anesthetic is a 'strong vasoconstrictor' by itself and does not need adrenaline?", o: ["Cocaine", "Lidocaine", "Procaine", "Tetracaine"], a: 0 }
    ];

    const container = document.getElementById('quiz-form');
    
    // إنشاء الأسئلة
    questions.forEach((q, i) => {
        let qDiv = document.createElement('div');
        qDiv.className = 'question';
        qDiv.id = 'q' + i;
        
        let qTitle = document.createElement('p');
        qTitle.textContent = `السؤال ${q.num}: ${q.q}`;
        qDiv.appendChild(qTitle);
        
        let optionsDiv = document.createElement('div');
        optionsDiv.className = 'options';
        
        q.o.forEach((opt, j) => {
            let label = document.createElement('label');
            label.innerHTML = `<input type="radio" name="q${i}" value="${j}"> ${opt}`;
            
            // تحديث شريط التقدم عند الاختيار
            label.querySelector('input').addEventListener('change', updateProgress);
            optionsDiv.appendChild(label);
        });
        
        qDiv.appendChild(optionsDiv);
        container.appendChild(qDiv);
    });

    function updateProgress() {
        let answered = 0;
        questions.forEach((q, i) => {
            if(document.querySelector(`input[name="q${i}"]:checked`)) {
                answered++;
            }
        });
        const percent = (answered / questions.length) * 100;
        document.getElementById('progress-bar').style.width = percent + '%';
    }

    function checkAnswers() {
        let score = 0;
        let answered = 0;
        
        questions.forEach((q, i) => {
            let selected = document.querySelector(`input[name="q${i}"]:checked`);
            let labels = document.querySelectorAll(`#q${i} label`);
            
            if (selected) answered++;

            labels.forEach((label, j) => {
                label.style.pointerEvents = 'none'; // تعطيل التعديل بعد الإرسال
                
                if (j === q.a) {
                    label.classList.add('correct');
                } else if (selected && selected.value == j) {
                    label.classList.add('wrong');
                }
            });

            // إظهار الإجابة الصحيحة إذا كان المستخدم مخطئاً أو لم يجب
            if (!selected || selected.value != q.a) {
                let textNode = document.createElement('span');
                textNode.className = 'correct-answer-text';
                textNode.innerHTML = `الإجابة الصحيحة: ${q.o[q.a]}`;
                document.getElementById('q' + i).appendChild(textNode);
            }

            if (selected && selected.value == q.a) score++;
        });

        // حساب وإظهار النتيجة النهائية
        const percent = (score / questions.length) * 100;
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        
        let feedback = "";
        if (percent >= 90) feedback = "ممتاز!";
        else if (percent >= 75) feedback = "جيد جداً!";
        else if (percent >= 50) feedback = "جيد، لكن يمكنك التحسن.";
        else feedback = "حاول مرة أخرى!";

        resultDiv.innerHTML = `
            ${feedback}<br>
            أجبت بشكل صحيح على <span style="color:var(--success-color)">${score}</span> 
            من أصل <span style="color:var(--primary-color)">${questions.length}</span> سؤال.<br>
            النسبة المئوية: <span style="color:var(--accent-color)">${percent.toFixed(1)}%</span>
        `;
        
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('restart-btn').style.display = 'block';
        window.scrollTo({top: 0, behavior: 'smooth'});
    }
</script>
</body>
</html>
